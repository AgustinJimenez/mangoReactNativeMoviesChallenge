name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test -- --ci

  # Separated from lint/unit-tests: booting an emulator is the slowest and
  # most infra-flaky part of CI, so a failure here shouldn't block the fast
  # lint/typecheck/unit signal above. Requires a TMDB_ACCESS_TOKEN repo
  # secret (see README) to exercise the flows that hit the real TMDB API —
  # without it, only language-switch.yaml runs (it doesn't call TMDB at
  # all), so a fork without the secret still gets a green, if partial, run
  # instead of a permanently red one.
  e2e:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Write .env
        run: echo "TMDB_ACCESS_TOKEN=${{ secrets.TMDB_ACCESS_TOKEN }}" > .env
      - name: Build debug APK
        run: cd android && ./gradlew assembleDebug
      - name: Install Maestro CLI
        # react-doctor flags the curl below as a curl-pipe-to-bash trust-
        # boundary risk (react-doctor/plugin-update-trust-risk, disabled
        # project-wide in doctor.config.js — see that file for why: inline
        # suppression comments aren't recognized inside a YAML run: | block).
        # It's Maestro's own official documented install command
        # (https://docs.maestro.dev/getting-started/installing-maestro) —
        # same pattern as rustup/nvm/homebrew installers — and Maestro
        # doesn't publish a pinned/checksummed alternative for CI use.
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      - name: Enable KVM for the emulator
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      # A debug APK has no embedded JS bundle (debuggableVariants defaults to
      # ["debug", "debugOptimized"] in android/app/build.gradle) — it loads
      # from Metro at runtime, same as a local debug build. Nothing in this
      # job started Metro before this was added, so `adb install` +
      # `launchApp` "succeeded" while the app was actually stuck on the red
      # "Unable to load script" screen the whole time — no `extendedWaitUntil`
      # timeout length could ever fix that, which is why bumping it 20s->40s
      # still failed (just took longer to time out).
      - name: Start Metro
        run: |
          npx react-native start > metro.log 2>&1 &
          for _ in $(seq 1 30); do
            if curl -s http://localhost:8081/status | grep -q "packager-status:running"; then
              echo "Metro is up"
              exit 0
            fi
            sleep 1
          done
          echo "Metro did not become ready in time" >&2
          cat metro.log
          exit 1
      # The if/for logic lives in .github/scripts/run-e2e-flows.sh, not
      # inline here — reactivecircus/android-emulator-runner's script: input
      # does not execute a multi-line block as one cohesive script, it runs
      # each line as its own independent `sh -c` invocation. An `if`/`for`
      # spanning multiple lines then has no way to find its `fi`/`done`:
      # confirmed by CI's exact failure, `sh -c if [ -z "" ]; then` erroring
      # on its own immediately after a separate, successful
      # `sh -c adb install ...` — two unrelated single-line invocations, not
      # one script. A real script file sidesteps the whole class of bug.
      - name: Boot emulator and run Maestro flows
        uses: reactivecircus/android-emulator-runner@v2
        env:
          TMDB_ACCESS_TOKEN: ${{ secrets.TMDB_ACCESS_TOKEN }}
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_6
          script: bash .github/scripts/run-e2e-flows.sh
      # Diagnostic only, temporary: if the Maestro flow above times out
      # waiting for "Movies" to appear, this is the only way to tell whether
      # Metro ever actually got a bundle request from the emulator (dead
      # silence in this log = still not reaching Metro despite "Start Metro"
      # passing and adb reverse succeeding) vs. a slow-but-real bundle build
      # (log shows a request, just took a while) — indistinguishable from
      # Maestro's own log alone, which just reports "timed out" either way.
      - name: Dump Metro log
        if: always()
        run: tail -n 200 metro.log || echo "no metro.log found"
