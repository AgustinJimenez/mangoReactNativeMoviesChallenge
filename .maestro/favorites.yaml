# Favorites a movie from the list, finds it on the Favorites tab, then
# unfavorites it and verifies it disappears. Requires a valid
# TMDB_ACCESS_TOKEN — see movies-list-and-search.yaml.
appId: com.mango.moviesapp
---
- launchApp
- extendedWaitUntil:
    visible: 'Movies'
    timeout: 240000
- extendedWaitUntil:
    visible:
      id: 'media-list-item'
    timeout: 240000
- tapOn:
    id: 'favorite-button'
    index: 0
- tapOn: 'Favorites'
- extendedWaitUntil:
    visible:
      id: 'media-list-item'
    timeout: 240000
- tapOn:
    id: 'favorite-button'
    index: 0
- assertNotVisible:
    id: 'media-list-item'
