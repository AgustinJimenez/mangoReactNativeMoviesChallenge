# Switches language via LanguageSwitcher and verifies known UI text changes
# accordingly, then restarts the app (without clearing state) to confirm the
# choice survives a cold start instead of reverting to the device default
# (see languagePreference.ts/useRestoreLanguagePreference.ts). Doesn't touch
# the TMDB API, so unlike the other flows this one passes regardless of
# TMDB_ACCESS_TOKEN.
appId: com.mango.moviesapp
---
- launchApp
- extendedWaitUntil:
    visible: 'Movies'
    timeout: 240000
- tapOn: 'ES'
- assertVisible: 'Películas'
- stopApp
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible: 'Películas'
    timeout: 240000
- tapOn: 'EN'
- assertVisible: 'Movies'
